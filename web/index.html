function openModal(s){
  const fam=getFamily(s.class_name);
  const fill=s.predicted_fill_rate||0;
  const fc=fillColor(fill);
  const viols=s.constraint_violations||[];
  const dayDates=SCHEDULE_DATA.day_dates||{};
  const dateStr=dayDates[s.day_of_week]?new Date(dayDates[s.day_of_week]).toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long"}):s.day_of_week;

  // Badge row helpers
  const rec=s.recommendation||"CONSIDER";
  const recClsMap={PINNED:"pinned",PROTECT_EXACT:"protect",PROTECT:"protect",PROTECT_SLOT:"protect",INCLUDE:"include",CONSIDER:"consider",DROP:"drop"};
  const badgeCls2=recClsMap[rec]||"consider";
  const recLabelMap={PINNED:"📌 Pinned",PROTECT_EXACT:"🛡 Protected",PROTECT:"🛡 Protected",PROTECT_SLOT:"🛡 Slot Protected",INCLUDE:"✓ Include",CONSIDER:"◎ Consider",DROP:"✗ Drop"};
  const autoProt=s.above_studio_avg?"<span class='modal-badge modal-badge-auto-prot'>🔒 Auto-Protected</span>":"";
  const expBadge=s.is_experimental?"<span class='modal-badge modal-badge-exp'>Experimental</span>":"";
  const primeBadge=isPrime(s.time)?"<span class='modal-badge' style='background:#FFFBEB;color:#92400E'>★ Prime Slot</span>":"";

  // Score breakdown
  const baseScore=s.base_score!=null?Math.round(s.base_score):null;
  const recBoost=s.recency_boost!=null?Math.round(s.recency_boost):null;
  const totalScore=Math.round(s.score||0);
  const scoreColor=totalScore>=70?"var(--green)":totalScore>=45?"var(--primary)":totalScore>=25?"var(--prime)":"var(--red)";
  const trustPct=Math.round((s.slot_trust||0)*100);
  const trustDots=[...Array(5)].map((_,i)=>`<span class="modal-trust-dot${i<Math.round((s.slot_trust||0)*5)?" lit":""}"></span>`).join("");
  const scorePanel=`
    <div class="modal-score-panel">
      <div class="modal-score-top">
        <div class="modal-score-ring-wrap">${scoreRing(totalScore,42)}</div>
        <div class="modal-score-details">
          <div class="modal-score-label">Composite Score</div>
          <div class="modal-score-bar-bg"><div class="modal-score-bar-fill" style="width:${totalScore}%;background:${scoreColor}"></div></div>
          <div class="modal-score-sub">
            ${baseScore!=null?`<span>Base: <span class="modal-score-boost" style="color:var(--text)">${baseScore}</span></span>`:""}
            ${recBoost!=null?`<span>Recency boost: <span class="modal-score-boost" style="color:${recBoost>=0?"var(--green)":"var(--red)"}">${recBoost>=0?"+":""}${recBoost}</span></span>`:""}
            ${s.slot_sessions!=null?`<span>${s.slot_sessions} sessions at this slot</span>`:""}
          </div>
        </div>
      </div>
      <div class="modal-trust-row">
        <div class="modal-trust-dots">${trustDots}</div>
        <span class="modal-trust-label">Slot confidence: <strong>${trustPct}%</strong>${trustPct<40?" — low data":""}${trustPct>=70?" — high confidence":""}</span>
      </div>
    </div>`;

  // Trainer comparison table
  const slotFill=s.blended_fill!=null?s.blended_fill:(s.historical_avg_fill||0);
  const studioAvg=s.studio_avg_fill;
  const trainerOverall=s.trainer_overall_fill;
  const compRows=[
    ["This slot (blended)",pct(slotFill,1),fillColor(slotFill)],
    studioAvg!=null?["Studio avg",pct(studioAvg,1),fillColor(studioAvg)]:null,
    trainerOverall!=null?["Trainer overall",pct(trainerOverall,1),fillColor(trainerOverall)]:null,
  ].filter(Boolean);

function showToast(msg, type, duration){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className="toast"+(type?" "+type:"");
  requestAnimationFrame(()=>t.classList.add("show"));
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove("show"), duration||3000);
}

// ============================================================
// PIPELINE — Generate button & status bar
// ============================================================
let _pipelinePoller=null;

function runPipelineFromHeader(){
  const btn=document.getElementById("gen-btn");
  btn.disabled=true;
  btn.classList.add("loading");
  fetch("/api/run-pipeline",{method:"POST"})
    .then(r=>r.json())
    .then(res=>{
      if(res.ok){
        showToast("Pipeline started — results ready in ~2 min","");
        pollPipelineStatus();
      } else {
        showToast("Error: "+(res.error||"Unknown error"),"error");
        btn.disabled=false;btn.classList.remove("loading");
      }
    })
    .catch(()=>{
      showToast("Server offline — try again","warn");
      btn.disabled=false;btn.classList.remove("loading");
    });
}

function pollPipelineStatus(){
  if(_pipelinePoller)clearInterval(_pipelinePoller);
  const TIMEOUT_MS=5*60*1000;
  const started=Date.now();
  _pipelinePoller=setInterval(()=>{
    if(Date.now()-started>TIMEOUT_MS){
      clearInterval(_pipelinePoller);_pipelinePoller=null;
      const btn=document.getElementById("gen-btn");
      if(btn){btn.disabled=false;btn.classList.remove("loading");}
      showToast("Pipeline timed out — check server logs","warn");
      return;
    }
    fetch("/api/pipeline-status")
      .then(r=>r.json())
      .then(d=>{
        const bar=document.getElementById("pipeline-bar");
        const msg=document.getElementById("pb-msg");
        const btn=document.getElementById("gen-btn");
        const status=d.status||(d.running?"running":"idle");
        if(status==="running"){
          if(bar)bar.className="visible";
          if(msg)msg.textContent=d.message||"Pipeline running…";
        } else if(status==="done"){
          clearInterval(_pipelinePoller);_pipelinePoller=null;
          if(bar)bar.className="visible";
          if(msg)msg.textContent=d.message||"Schedule ready — reload to see new results";
          if(btn){btn.disabled=false;btn.classList.remove("loading");}
          showToast("Schedule updated — reload to see results","");
        } else if(status==="failed"){
          clearInterval(_pipelinePoller);_pipelinePoller=null;
          if(bar){bar.className="visible error";}
          if(msg)msg.textContent=d.message||"Pipeline failed. Check server logs.";
          if(btn){btn.disabled=false;btn.classList.remove("loading");}
          showToast("Pipeline failed — check logs","error");
        } else {
          if(bar)bar.className="";
          if(btn){btn.disabled=false;btn.classList.remove("loading");}
          clearInterval(_pipelinePoller);_pipelinePoller=null;
        }
      })
      .catch(()=>{});
  },4000);
}

let _rulesCatalog=null;

function rvEscapeHtml(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function rvEscapeAttr(v){return rvEscapeHtml(v).replace(/\n/g,"&#10;");}

function renderRulesView(area){
  const wrap=document.createElement("div");
  wrap.className="rules-view";
  wrap.innerHTML=`
    <div class="rv-header">
      <div>
        <div class="rv-title">Scheduling Rules</div>
        <div class="rv-sub">Enable or disable rule categories and individual rules. Use bulk buttons to toggle all rules in a group. Edit rule text used by the AI planner.</div>
      </div>
      <div class="rv-actions">
        <span class="rv-status" id="rv-status"></span>
        <button class="rv-run-btn" id="rv-run-btn" onclick="rvRunPipeline()">&#9654; Re-run Pipeline</button>
      </div>
    </div>
    <div class="rv-search-row">
      <input class="rv-search" id="rv-search" type="text" placeholder="Search rules by name or content…" oninput="rvRenderCatalog(this.value)">
      <div class="rv-bulk-row">
        <button class="rv-bulk-btn" onclick="rvGlobalBulk(true)">Enable All</button>
        <button class="rv-bulk-btn" onclick="rvGlobalBulk(false)">Disable All</button>
      </div>
    </div>
    <div id="rv-groups"><div style="padding:20px;color:var(--text-muted);font-size:13px">Loading rules…</div></div>`;
  area.appendChild(wrap);
  rvLoadRules();
}

function setRVStatus(msg,tone){
  const el=document.getElementById("rv-status");
  if(!el)return;
  el.style.color=tone==="ok"?"var(--green)":tone==="error"?"var(--red)":"var(--text-muted)";
  el.textContent=msg||"";
}

function rvRunPipeline(){
  const btn=document.getElementById("rv-run-btn");
  if(btn){btn.disabled=true;btn.textContent="Starting…";}
  fetch("/api/run-pipeline",{method:"POST"})
    .then(r=>r.json())
    .then(res=>{
      if(res.ok){
        setRVStatus("Pipeline started — reload in ~2 min to see results","ok");
        if(btn){btn.disabled=false;btn.textContent="▶ Re-run Pipeline";}
        pollPipelineStatus();
      } else {
        setRVStatus("Error: "+(res.error||"unknown"),"error");
        if(btn){btn.disabled=false;btn.textContent="▶ Re-run Pipeline";}
      }
    })
    .catch(()=>{
      setRVStatus("Server offline","error");
      if(btn){btn.disabled=false;btn.textContent="▶ Re-run Pipeline";}
    });
}

function rvLoadRules(){
  fetch("/api/rules-config")
    .then(r=>r.json())
    .then(data=>{
      _rulesCatalog=data;
      rvRenderCatalog();
      setRVStatus("Rules loaded","ok");
    })
    .catch(()=>setRVStatus("Could not load rules","error"));
}

function rvRenderCatalog(searchTerm){
  const host=document.getElementById("rv-groups");
  if(!host)return;
  if(!_rulesCatalog||!Array.isArray(_rulesCatalog.groups)){
    host.innerHTML='<div style="padding:20px;color:var(--text-muted)">No rule catalog available.</div>';
    return;
  }
  const q=(searchTerm||"").toLowerCase();
  host.innerHTML="";
  _rulesCatalog.groups.forEach(group=>{
    const rules=(group.rules||[]);
    const filtered=q?rules.filter(r=>(r.title||r.id||"").toLowerCase().includes(q)||(r.description||"").toLowerCase().includes(q)):rules;
    if(q&&filtered.length===0)return;
    const enabled=rules.filter(r=>r.enabled).length;
    const total=rules.length;
    const gEl=document.createElement("div");
    gEl.className="rv-group";
    gEl.innerHTML=`
      <div class="rv-group-hdr">
        <div class="rv-group-left" style="flex:1">
          <div class="rv-group-title">${rvEscapeHtml(group.label)}</div>
          <div class="rv-group-desc">${rvEscapeHtml(group.description||"")}</div>
          <span class="rv-count">${enabled}/${total} enabled</span>
        </div>
        <div class="rv-group-bulk">
          <button class="rv-bulk-btn" onclick="rvBulkToggle('${group.id}',true)">Enable All</button>
          <button class="rv-bulk-btn" onclick="rvBulkToggle('${group.id}',false)">Disable All</button>
        </div>
        <label class="rv-toggle" title="${group.enabled?"Disable":"Enable"} category" style="margin-left:8px">
          <input type="checkbox" ${group.enabled?"checked":""} onchange="rvSaveCategory('${group.id}',this.checked)">
          <div class="rv-track"></div><div class="rv-knob"></div>
        </label>
      </div>
      <div class="rv-rules-list" id="rv-list-${group.id}"></div>`;
    const listEl=gEl.querySelector(".rv-rules-list");
    (q?filtered:rules).forEach(rule=>{
      const rEl=document.createElement("div");
      rEl.className="rv-rule"+(rule.enabled?"":" off");
      rEl.id="rv-rule-"+rule.id;
      rEl.innerHTML=`
        <div class="rv-rule-top">
          <div>
            <div class="rv-rule-title">${rvEscapeHtml(rule.title||rule.id)}</div>
            <div class="rv-rule-meta">
              <span class="rv-rule-chip">${rvEscapeHtml(rule.id)}</span>
              ${rule.type?`<span class="rv-rule-chip">${rvEscapeHtml(rule.type.replace(/_/g," "))}</span>`:""}
            </div>
          </div>
          <label class="rv-toggle">
            <input type="checkbox" ${rule.enabled?"checked":""} onchange="rvSaveRule('${rule.id}',this.checked)">
            <div class="rv-track"></div><div class="rv-knob"></div>
          </label>
        </div>
        <textarea class="rv-textarea" id="rv-text-${rule.id}" data-default="${rvEscapeAttr(rule.description||"")}">${rvEscapeHtml(rule.description||"")}</textarea>
        <div class="rv-rule-actions">
          <span class="rv-hint">Edit the rule text used by the AI scheduler.</span>
          <div class="rv-btns">
            <button class="rv-btn" title="Copy rule text" onclick="rvCopyText('${rule.id}')">Copy</button>
            <button class="rv-btn" onclick="rvResetText('${rule.id}')">Reset</button>
            <button class="rv-btn primary" onclick="rvSaveText('${rule.id}')">Save</button>
          </div>
        </div>`;
      listEl.appendChild(rEl);
    });
    host.appendChild(gEl);
  });
  if(q&&host.children.length===0){
    host.innerHTML=`<div style="padding:20px;color:var(--text-muted);font-size:13px">No rules match "<strong>${rvEscapeHtml(q)}</strong>"</div>`;
  }
}

function rvBulkToggle(groupId,enable){
  const group=(_rulesCatalog&&_rulesCatalog.groups||[]).find(g=>g.id===groupId);
  if(!group)return;
  const rules={};
  (group.rules||[]).forEach(r=>{rules[r.id]={enabled:enable}});
  rvPostUpdate({rules},enable?"All enabled":"All disabled",true);
}

function rvCopyText(id){
  const el=document.getElementById("rv-text-"+id);
  if(!el)return;
  navigator.clipboard.writeText(el.value).then(()=>showToast("Rule text copied","")).catch(()=>{});
}

function rvGlobalBulk(enable){
  if(!_rulesCatalog||!Array.isArray(_rulesCatalog.groups))return;
  const rules={};
  _rulesCatalog.groups.forEach(g=>(g.rules||[]).forEach(r=>{rules[r.id]={enabled:enable}}));
  rvPostUpdate({rules},enable?"All rules enabled":"All rules disabled",true);
}

function rvPostUpdate(payload,successMsg,rerender){
  fetch("/api/save-rules",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
    .then(r=>r.json())
    .then(res=>{
      if(!res.ok&&res.error)throw new Error(res.error);
      if(res.catalog){_rulesCatalog=res.catalog;}
      if(rerender)rvRenderCatalog();
      setRVStatus(successMsg||"Saved","ok");
      showToast(successMsg||"Saved","");
    })
    .catch(err=>setRVStatus(err&&err.message?err.message:"Save failed","error"));
}

function rvSaveCategory(id,enabled){rvPostUpdate({categories:{[id]:{enabled:enabled}}},"Category saved",true);}
function rvSaveRule(id,enabled){rvPostUpdate({rules:{[id]:{enabled:enabled}}},"Rule saved",true);}
function rvSaveText(id){
  const el=document.getElementById("rv-text-"+id);
  if(!el)return;
  rvPostUpdate({rules:{[id]:{description:el.value}}},"Rule text saved",false);
}
function rvResetText(id){
  const el=document.getElementById("rv-text-"+id);
  if(!el)return;
  el.value=el.dataset.default||"";
}

// HISTORY VIEW — Historical slot baseline from scored data
// ============================================================
let _histData=null;
let _histLoc=null;
let _histSort="score";

function renderHistoryView(area){
  const wrap=document.createElement("div");
  wrap.className="hist-view";
  wrap.innerHTML=`
    <div class="hist-view-header">
      <div class="hist-view-title">📊 Historical Baseline</div>
      <div class="hist-view-sub">All known class+trainer+slot combinations ranked by performance. Auto-protected slots (🔒) are those above the studio average fill rate with sufficient history.</div>
    </div>
    <div id="hist-loc-tabs" class="hist-loc-tabs"></div>
    <div class="hist-sort-row">
      <span class="hist-sort-label">Sort by:</span>
      <button class="hist-sort-btn active" id="hsort-score" onclick="histSetSort('score')">Score</button>
      <button class="hist-sort-btn" id="hsort-fill" onclick="histSetSort('fill')">Fill Rate</button>
      <button class="hist-sort-btn" id="hsort-sessions" onclick="histSetSort('sessions')">Sessions</button>
      <button class="hist-sort-btn" id="hsort-day" onclick="histSetSort('day')">Day/Time</button>
    </div>
    <div id="hist-summary-row" class="hist-summary-row"></div>
    <div id="hist-content"></div>`;
  area.appendChild(wrap);
  if(_histData){histRenderContent();}
  else{
    document.getElementById("hist-content").innerHTML=`<div class="hist-empty">Loading historical data…</div>`;
    fetch("/api/historic-slots")
      .then(r=>r.json())
      .then(d=>{_histData=d;histRenderContent();})
      .catch(()=>{document.getElementById("hist-content").innerHTML=`<div class="hist-empty">Could not load historical data. Run the pipeline first to generate scores.</div>`;});
  }
}

function histSetSort(s){
  _histSort=s;
  document.querySelectorAll(".hist-sort-btn").forEach(b=>b.classList.remove("active"));
  const el=document.getElementById("hsort-"+s);
  if(el)el.classList.add("active");
  histRenderContent();
}

function histRenderContent(){
  if(!_histData)return;
  const ranking=(_histData.class_slot_ranking||[]);
  const locs=[...new Set(ranking.map(r=>r.location))].filter(Boolean).sort();
  if(!_histLoc&&locs.length)_histLoc=locs[0];

  const tabBar=document.getElementById("hist-loc-tabs");
  if(tabBar){
    tabBar.innerHTML=locs.map(l=>`<button class="hist-loc-tab${l===_histLoc?" active":""}" onclick="histSetLoc('${l.replace(/'/g,"\\'")}')"> ${l.length>28?l.slice(0,26)+"…":l}</button>`).join("");
  }

  const locSlots=ranking.filter(r=>r.location===_histLoc);
  const sorted=[...locSlots].sort((a,b)=>{
    if(_histSort==="score")return(b.score||0)-(a.score||0);
    if(_histSort==="fill")return(b.blended_fill||0)-(a.blended_fill||0);
    if(_histSort==="sessions")return(b.session_count||0)-(a.session_count||0);
    if(_histSort==="day"){
      const dayOrd={Monday:0,Tuesday:1,Wednesday:2,Thursday:3,Friday:4,Saturday:5,Sunday:6};
      const dc=(dayOrd[a.day_name]||0)-(dayOrd[b.day_name]||0);
      return dc!==0?dc:(a.time||"").localeCompare(b.time||"");
    }
    return 0;
  });

  const sumEl=document.getElementById("hist-summary-row");
  if(sumEl){
    const protect=locSlots.filter(r=>r.recommendation==="PROTECT").length;
    const autoP=locSlots.filter(r=>r.above_studio_avg).length;
    const avgFill=locSlots.length?locSlots.reduce((a,r)=>a+(r.blended_fill||0),0)/locSlots.length:0;
    const studioAvg=locSlots.length?locSlots[0].studio_avg_fill:null;
    sumEl.innerHTML=`
      <span class="hist-sum-chip"><span>${locSlots.length}</span> combos tracked</span>
      <span class="hist-sum-chip">Avg fill <span>${pct(avgFill)}</span></span>
      ${studioAvg!=null?`<span class="hist-sum-chip">Studio avg <span>${pct(studioAvg)}</span></span>`:""}
      <span class="hist-sum-chip">🛡 Protect <span>${protect}</span></span>
      <span class="hist-sum-chip">🔒 Auto-protected <span>${autoP}</span></span>`;
  }

  const content=document.getElementById("hist-content");
  if(!content)return;
  if(!sorted.length){content.innerHTML=`<div class="hist-empty">No historical data for this location. Run the pipeline to generate scores.</div>`;return;}

  const groups=[
    {label:"🔒 Auto-Protected — Above Studio Average",filter:r=>r.above_studio_avg,cls:"prot"},
    {label:"🛡 Protect — High Performers",filter:r=>!r.above_studio_avg&&r.recommendation==="PROTECT",cls:"prot"},
    {label:"✓ Include — Strong Regulars",filter:r=>r.recommendation==="INCLUDE",cls:"inc"},
    {label:"◎ Consider — Moderate History",filter:r=>r.recommendation==="CONSIDER",cls:"con"},
    {label:"✗ Drop — Weak Performance",filter:r=>r.recommendation==="DROP",cls:"drop"},
  ];

  content.innerHTML="";
  groups.forEach(g=>{
    const slots=sorted.filter(g.filter);
    if(!slots.length)return;
    const sec=document.createElement("div");
    sec.className="hist-section";
    sec.innerHTML=`<div class="hist-section-title">${g.label} <span style="opacity:0.6">(${slots.length})</span></div>`;
    const grid=document.createElement("div");
    grid.className="hist-cards-grid";
    slots.forEach(r=>{
      const fc=fillColor(r.blended_fill||0);
      const isProtected=r.above_studio_avg;
      const card=document.createElement("div");
      card.className="hist-card"+(isProtected?" prot":"");
      const trustPct=Math.round((r.slot_trust||0)*100);
      const recTag={PROTECT:"prot",INCLUDE:"inc",CONSIDER:"con",DROP:"drop"}[r.recommendation]||"con";
      card.innerHTML=`
        <div class="hist-card-top">
          <div class="hist-card-fill" style="color:${fc}">${pct(r.blended_fill)}</div>
          ${isProtected?`<span class="hist-card-lock" title="Auto-protected — above studio avg">🔒</span>`:""}
        </div>
        <div class="hist-card-class">${displayClass(r.class)}</div>
        <div class="hist-card-trainer">${r.trainer}</div>
        <div class="hist-card-meta">
          <span class="hist-card-tag ${recTag}">${r.recommendation}</span>
          <span class="hist-card-tag">${r.day_name?.slice(0,3)} ${r.time}</span>
          <span class="hist-card-tag">${r.session_count} sess</span>
          ${trustPct>=50?`<span class="hist-card-tag" style="background:var(--primary-mid);color:var(--primary)">${trustPct}% conf</span>`:""}
          <span class="hist-card-tag" style="background:#F5F3FF;color:#7C3AED">${Math.round(r.score||0)} pts</span>
        </div>`;
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    content.appendChild(sec);
  });
}

function histSetLoc(loc){
  _histLoc=loc;
  histRenderContent();
}

let _settSection="qualifications";

const QUAL_KEYS=["all_barre","mat_57","powercycle","strength_lab","foundations","pre_post_natal","amped_up","hiit","recovery"];
const QUAL_LABELS={"all_barre":"All Barre","mat_57":"Mat 57","powercycle":"PowerCycle","strength_lab":"Strength Lab","foundations":"Foundations","pre_post_natal":"Pre/Post Natal","amped_up":"Amped Up","hiit":"HIIT","recovery":"Recovery"};
const DAYS_ALL=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const LOCS_ALL=["Kwality House, Kemps Corner","Supreme HQ, Bandra","Kenkere House"];

function renderSettingsView(area){
  const wrap=document.createElement("div");
  wrap.className="sett-view";
  wrap.innerHTML=`
    <div class="sett-view-header">
      <div class="sett-view-title">⚙ Settings</div>
      <div class="sett-view-sub">Configure trainer qualifications, availability, and scheduling targets. Changes take effect on the next pipeline run.</div>
    </div>
    <div class="sett-tabs">
      <button class="sett-tab active" id="stab-qualifications" onclick="settSetTab('qualifications')">Trainer Qualifications</button>
      <button class="sett-tab" id="stab-availability" onclick="settSetTab('availability')">Trainer Availability</button>
      <button class="sett-tab" id="stab-targets" onclick="settSetTab('targets')">Schedule Targets</button>
    </div>
    <div class="sett-section active" id="ssec-qualifications">
      <div class="sett-section-label">Trainer Qualifications</div>
      <div class="sett-section-desc">Check the formats each trainer is certified to teach. These determine which class types the AI planner can assign to each trainer.</div>
      <div id="qual-table-wrap"><div style="color:var(--text-muted);font-size:13px">Loading trainer profiles…</div></div>
      <div class="sett-save-bar">
        <button class="sett-save-btn" onclick="settSaveQualifications()">Save Qualifications</button>
        <span class="sett-save-status" id="qual-save-status"></span>
      </div>
    </div>
    <div class="sett-section" id="ssec-availability">
      <div class="sett-section-label">Trainer Availability</div>
      <div class="sett-section-desc">Set which days each trainer is available at each location, and their preferred time window. Changes affect which slots they can be assigned to.</div>
      <div id="avail-grid-wrap" class="avail-grid"></div>
      <div class="sett-save-bar">
        <button class="sett-save-btn" onclick="settSaveAvailability()">Save Availability</button>
        <span class="sett-save-status" id="avail-save-status"></span>
      </div>
    </div>
    <div class="sett-section" id="ssec-targets">
      <div class="sett-section-label">Schedule Targets</div>
      <div class="sett-section-desc">Set target and maximum classes per day per location. The AI planner uses these as soft constraints when building the schedule.</div>
      <div id="targets-wrap"></div>
      <div class="sett-save-bar">
        <button class="sett-save-btn" onclick="settSaveTargets()">Save Targets</button>
        <span class="sett-save-status" id="targets-save-status"></span>
      </div>
    </div>`;
  area.appendChild(wrap);
  settLoadData();
}

function settSetTab(tab){
  _settSection=tab;
  document.querySelectorAll(".sett-tab").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".sett-section").forEach(s=>s.classList.remove("active"));
  const btn=document.getElementById("stab-"+tab);
  if(btn)btn.classList.add("active");
  const sec=document.getElementById("ssec-"+tab);
  if(sec)sec.classList.add("active");
}

function settLoadData(){
  const p1=_settTrainerProfiles?Promise.resolve(_settTrainerProfiles):fetch("/api/trainer-profiles").then(r=>r.json()).then(d=>{
    _settTrainerProfiles=Array.isArray(d)?d:(Array.isArray(d?.data)?d.data:[]);
    return _settTrainerProfiles;
  }).catch(()=>{_settTrainerProfiles=[];return[];});
  const p2=_settSchedConfig?Promise.resolve(_settSchedConfig):fetch("/api/schedule-config").then(r=>r.json()).then(d=>{
    _settSchedConfig=(d&&!d.error)?d:{targets:{},manual_protected:[],manual_excluded:[]};
    return _settSchedConfig;
  }).catch(()=>{_settSchedConfig={targets:{},manual_protected:[],manual_excluded:[]};return _settSchedConfig;});
  Promise.all([p1,p2]).then(()=>{settRenderQualifications();settRenderAvailability();settRenderTargets();}).catch(e=>console.error("Settings load error",e));
}

function settRenderQualifications(){
  const wrap=document.getElementById("qual-table-wrap");
  if(!wrap||!_settTrainerProfiles)return;
  const trainers=Array.isArray(_settTrainerProfiles)?_settTrainerProfiles:[];
  const sorted=[...trainers].sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  wrap.innerHTML=`<div class="qual-wrap"><table class="qual-table" id="qual-table">
    <thead><tr>
      <th>Trainer</th>
      ${QUAL_KEYS.map(k=>`<th>${QUAL_LABELS[k]||k}</th>`).join("")}
    </tr></thead>
    <tbody>
      ${sorted.map(t=>`<tr>
        <td>${t.name||""}${t.tier?`<span class="qual-tier">${t.tier}</span>`:""}</td>
        ${QUAL_KEYS.map(k=>`<td><input type="checkbox" class="qual-cb" data-trainer="${(t.name||"").replace(/"/g,"&quot;")}" data-key="${k}" ${(t.qualifications||{})[k]?"checked":""}></td>`).join("")}
      </tr>`).join("")}
    </tbody>
  </table></div>`;
}

function settSaveQualifications(){
  if(!_settTrainerProfiles)return;
  const table=document.getElementById("qual-table");
  if(!table)return;
  const cbs=table.querySelectorAll(".qual-cb");
  const updates={};
  cbs.forEach(cb=>{
    const name=cb.dataset.trainer;
    const key=cb.dataset.key;
    if(!updates[name])updates[name]={};
    updates[name][key]=cb.checked;
  });
  const updated=(_settTrainerProfiles||[]).map(t=>{
    if(updates[t.name]){return{...t,qualifications:{...t.qualifications,...updates[t.name]}};}
    return t;
  });
  _settTrainerProfiles=updated;
  fetch("/api/save-trainer-profiles",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(updated)})
    .then(r=>r.json())
    .then(res=>{
      const s=document.getElementById("qual-save-status");
      if(s)s.textContent=res.ok?"Saved successfully!":"Error saving";
      showToast(res.ok?"Trainer qualifications saved":"Save failed",res.ok?"":"error");
      setTimeout(()=>{if(s)s.textContent="";},3000);
    }).catch(()=>{showToast("Server error","error");});
}

function settRenderAvailability(){
  const wrap=document.getElementById("avail-grid-wrap");
  if(!wrap||!_settTrainerProfiles)return;
  const trainers=Array.isArray(_settTrainerProfiles)?_settTrainerProfiles:[];
  wrap.innerHTML="";
  trainers.sort((a,b)=>(a.name||"").localeCompare(b.name||"")).forEach(t=>{
    const locs=t.locations||{};
    Object.entries(locs).forEach(([loc,ld])=>{
      const card=document.createElement("div");
      card.className="avail-card";
      const activeDays=new Set(ld.available_days||[]);
      const tw=ld.time_window||{};
      card.innerHTML=`
        <div class="avail-name">${t.name||""}</div>
        <div class="avail-loc-lbl">${loc.length>30?loc.slice(0,28)+"…":loc}</div>
        <div class="avail-days" id="avail-days-${CSS.escape(t.name+":"+loc)}">
          ${DAYS_ALL.map(d=>`<span class="avail-day-chip${activeDays.has(d)?" on":""}" data-trainer="${t.name}" data-loc="${loc}" data-day="${d}" onclick="settToggleDay(this)">${d.slice(0,3)}</span>`).join("")}
        </div>
        <div class="avail-time-row">
          <label>From</label>
          <input type="time" data-trainer="${t.name}" data-loc="${loc}" data-field="start" value="${tw.start||"06:00"}">
          <label>To</label>
          <input type="time" data-trainer="${t.name}" data-loc="${loc}" data-field="end" value="${tw.end||"22:00"}">
        </div>`;
      wrap.appendChild(card);
    });
  });
  if(!wrap.children.length){
    wrap.innerHTML=`<div style="color:var(--text-muted);font-size:13px">No trainer location data found. Check trainer_profiles.json.</div>`;
  }
}

function settToggleDay(el){el.classList.toggle("on");}

function settSaveAvailability(){
  if(!_settTrainerProfiles)return;
  const updatedMap={};
  document.querySelectorAll(".avail-day-chip").forEach(chip=>{
    const k=chip.dataset.trainer+":"+chip.dataset.loc;
    if(!updatedMap[k])updatedMap[k]={trainer:chip.dataset.trainer,loc:chip.dataset.loc,days:[]};
    if(chip.classList.contains("on"))updatedMap[k].days.push(chip.dataset.day);
  });
  const timeInputs={};
  document.querySelectorAll(".avail-time-row input").forEach(inp=>{
    const k=inp.dataset.trainer+":"+inp.dataset.loc;
    if(!timeInputs[k])timeInputs[k]={};
    timeInputs[k][inp.dataset.field]=inp.value;
  });
  const updated=(_settTrainerProfiles||[]).map(t=>{
    const locs={...t.locations};
    Object.keys(locs).forEach(loc=>{
      const k=t.name+":"+loc;
      if(updatedMap[k]){locs[loc]={...locs[loc],available_days:updatedMap[k].days};}
      if(timeInputs[k]){locs[loc]={...locs[loc],time_window:{...(locs[loc].time_window||{}),...timeInputs[k]}};}
    });
    return{...t,locations:locs};
  });
  _settTrainerProfiles=updated;
  fetch("/api/save-trainer-profiles",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(updated)})
    .then(r=>r.json())
    .then(res=>{
      const s=document.getElementById("avail-save-status");
      if(s)s.textContent=res.ok?"Saved!":"Error";
      showToast(res.ok?"Availability saved":"Save failed",res.ok?"":"error");
      setTimeout(()=>{if(s)s.textContent="";},3000);
    }).catch(()=>showToast("Server error","error"));
}

function settRenderTargets(){
  const wrap=document.getElementById("targets-wrap");
  if(!wrap||!_settSchedConfig)return;
  const targets=(_settSchedConfig.targets||{});
  wrap.innerHTML=LOCS_ALL.map(loc=>{
    const locT=targets[loc]||{};
    return`<div class="target-loc-hdr">${loc}</div>
    <div class="target-day-grid">
      ${DAYS_ALL.map(day=>{
        const dt=locT[day]||{};
        return`<div class="target-day-card">
          <div class="target-day-lbl">${day}</div>
          <div class="target-input-row">
            <label>Target</label>
            <input type="number" min="0" max="20" data-loc="${loc}" data-day="${day}" data-field="target" value="${dt.target||8}" class="target-inp">
          </div>
          <div class="target-input-row" style="margin-top:5px">
            <label>Maximum</label>
            <input type="number" min="0" max="25" data-loc="${loc}" data-day="${day}" data-field="max" value="${dt.max||12}" class="target-inp">
          </div>
        </div>`;
      }).join("")}
    </div>`;
  }).join("");
}

function settSaveTargets(){
  const targets={};
  document.querySelectorAll(".target-inp").forEach(inp=>{
    const{loc,day,field}=inp.dataset;
    if(!targets[loc])targets[loc]={};
    if(!targets[loc][day])targets[loc][day]={};
    targets[loc][day][field]=parseInt(inp.value)||0;
  });
  const config={...(_settSchedConfig||{}),targets};
  _settSchedConfig=config;
  fetch("/api/save-schedule-config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(config)})
    .then(r=>r.json())
    .then(res=>{
      const s=document.getElementById("targets-save-status");
      if(s)s.textContent=res.ok?"Saved!":"Error";
      showToast(res.ok?"Schedule targets saved":"Save failed",res.ok?"":"error");
      setTimeout(()=>{if(s)s.textContent="";},3000);
    }).catch(()=>showToast("Server error","error"));
}
</script>

</body>
</html>
